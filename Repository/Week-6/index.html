<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>Task Planner Pro</title>
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="script.js"></script>
  </head>
  <body>
    <header>
      <h1>Task Planner Pro</h1>
      <p>Organisiere deine Aufgaben einfach und flexibel.</p>
    </header>

    <main>
      <!-- 2. ADD-TASK: Formular mit Label, Input, Button + Fehlermeldung rechts -->
      <section class="task-section add-task">
        <form action="" id="addTaskForm">
          <label for="taskInput">Aufgabe hinzufügen</label>
          <input type="text" id="taskInput" data-tooltip="Schreibe eine neue Aufgabe" placeholder="Deine Aufgabe (z.B. Mathe Seite 10, Aufgabe 1)" />
          <div class="error-wrapper">
            <button id="addTaskBtn" type="submit">Aufgabe hinzufügen</button>
            <span id="lengthError" class="invisible">
              Die Aufgabe muss mindestens drei Zeichen haben!
            </span>
          </div>
        </form>
      </section>

      <!-- 3. KASTEN: AUFAGEN mit Liste und Filtern -->
      <section class="task-section tasks-list">
        <h2>Aufgaben</h2>
        <div id="filterBtnContainer">
          <button type="button" id="filterAll" class="filterButton active" data-filter="all">
            Alle (<span>0</span>)
          </button>
          <button type="button" id="filterOpen" class="filterButton" data-filter="open">
            Offen (<span>0</span>)
          </button>
          <button type="button" id="filterDone" class="filterButton" data-filter="done">
            Erledigt (<span>0</span>)
          </button>
        </div>
        <ul id="taskList">
          <!-- Hier kommen die Aufgaben per JavaScript rein -->
        </ul>
      </section>

      <!-- 4. KASTEN: MOTIVATION -->
      <section class="task-section motivation">
        <h2>Motivation</h2>
        <button id="motivationBtn" type="button">Motivationstipp anzeigen</button>
        <div id="motivationOutput"></div>
      </section>
    </main>

    <footer>
      <p>Woche 6 - Übungsseite mit HTML/CSS/JS</p>
    </footer>
  </body>
</html>
